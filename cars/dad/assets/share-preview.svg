<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Small crossover SUV report preview"><rect width="1200" height="630" fill="#f5f3ee"/><g font-family="Arial,Helvetica,sans-serif" fill="#17202a"><text x="28" y="50" font-size="18" font-weight="700" letter-spacing="2.4" fill="#255b4c">VEHICLE SHOPPING BRIEF · WALLA WALLA, WASHINGTON · JULY 2026</text><text x="28" y="125" font-size="62" font-weight="800" letter-spacing="-2.7">Small crossover SUVs for an easy,</text><text x="28" y="195" font-size="62" font-weight="800" letter-spacing="-2.7">premium-feeling in-town car</text><text x="28" y="245" font-size="24" fill="#5d6875">The goal is a vehicle that is clearly not a sedan, feels substantial and safe on occasional highway</text><text x="28" y="278" font-size="24" fill="#5d6875">drives, but stays compact enough to park comfortably beside a Jeep Cherokee in the garage.</text><g><rect x="28" y="320" width="1144" height="82" rx="18" fill="#fff" stroke="#d9dde2"/><circle cx="73" cy="361" r="22" fill="none" stroke="#17202a" stroke-width="3"/><path d="M55 350c8 1 13 5 18 13 5-8 10-12 18-13-5 10-11 17-18 20-7-3-13-10-18-20z" fill="none" stroke="#17202a" stroke-width="3"/><text x="112" y="354" font-size="21" font-weight="700">Mazda CX-30 2.5 S Premium</text><text x="112" y="380" font-size="17" fill="#5d6875"><tspan font-weight="700">Most premium-feeling:</tspan> narrowest body, refined interior and the most polished driving experience.</text></g><g><rect x="28" y="415" width="1144" height="82" rx="18" fill="#fff" stroke="#d9dde2"/><ellipse cx="73" cy="456" rx="24" ry="15" fill="none" stroke="#17202a" stroke-width="3"/><ellipse cx="73" cy="456" rx="8" ry="21" fill="none" stroke="#17202a" stroke-width="3"/><ellipse cx="73" cy="449" rx="16" ry="7" fill="none" stroke="#17202a" stroke-width="3"/><text x="112" y="449" font-size="21" font-weight="700">Toyota Corolla Cross Hybrid XSE</text><text x="112" y="475" font-size="17" fill="#5d6875"><tspan font-weight="700">Best overall vehicle:</tspan> strongest blend of hybrid efficiency, AWD, highway capability and local service.</text></g><g><rect x="28" y="510" width="1144" height="82" rx="18" fill="#fff" stroke="#d9dde2"/><circle cx="73" cy="551" r="22" fill="none" stroke="#17202a" stroke-width="3"/><path d="M57 564l8-28 8 8 7-7 9 27-12-7-7 7-6-13-7 13z" fill="none" stroke="#17202a" stroke-width="3" stroke-linejoin="round"/><text x="112" y="544" font-size="21" font-weight="700">Buick Encore GX Avenir</text><text x="112" y="570" font-size="17" fill="#5d6875"><tspan font-weight="700">Smallest overall:</tspan> nearly five inches shorter than the Toyota, with an upright, premium-oriented cabin.</text></g></g></svg>